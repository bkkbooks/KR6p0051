body:
  text: 注十疑論并序天台智者大師說沙門澄彧註沙門贊寧序序曰夫談大人境界者卒不可貴信蓋難信之法也譬若觀君王之尊貴歎曰我必不能親近歟一旦因依致之于左右此他力之驗也惟智者大師能焉自登忍力作師子吼吼聲普聞可畏難解喻如卿導之言不軆異之路奚通是故吳山澄彧上人揮彌天之筆章句出焉令披文見意不俣終日也領彼迷兒歸于父舍末有道贊人者專修淨業誘掖眾多令愚稱讚於此門約我往生於彼土序冠論首以先啟行時大宋太平興國八年初建鶉味月序
